volumes:
  loki-data:
  grafana-data:
  prometheus-data:

x-bot-common: &bot-common
  build:
    context: .
    dockerfile: Dockerfile.bot
  restart: unless-stopped
  env_file: .env
  environment:
    - TZ=UTC
  command: python bot.py
  volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_LOGS_DIR}:/app/logs
  depends_on:
    bot-hub:
      condition: service_healthy
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ---- HUB: Brain + data presenter + orchestrator ----
  # Runs monitor + analytics in-process. Single container replaces
  # the old hub + monitor + analytics (3 → 1).
  bot-hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    container_name: bot-hub
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.openclaw.local
        required: false
    environment:
      - TZ=UTC
      - DASHBOARD_PORT=9035
      - OPENCLAW_URL=http://openclaw-bridge:18080/intel
      - OPENCLAW_TIMEOUT_SECONDS=10
      - OPENCLAW_DAILY_REVIEW_ENABLED=true
      - OPENCLAW_DAILY_REVIEW_INTERVAL_HOURS=24
      - OPENCLAW_DAILY_REVIEW_FORCE_PAID=true
    command: python hub_main.py
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    volumes:
      - ${HOST_DATA_DIR}:/app/data
      - ${HOST_LOGS_DIR}:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---- OpenClaw bridge: internal low-latency advisory endpoint for hub ----
  openclaw-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: openclaw-bridge
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
      - path: .env.openclaw.local
        required: false
    environment:
      - TZ=UTC
      - OPENCLAW_BRIDGE_HOST=0.0.0.0
      - OPENCLAW_BRIDGE_PORT=18080
      - OPENCLAW_BRIDGE_HUB_URL=http://bot-hub:9035
      - OPENCLAW_BRIDGE_TIMEOUT_SECONDS=6
      - OPENCLAW_BRIDGE_MAX_LATENCY_SECONDS=6.5
      - OPENCLAW_BRIDGE_LOCAL_ENABLED=false
      - OPENCLAW_BRIDGE_LOCAL_TIMEOUT_SECONDS=5
      - OPENCLAW_BRIDGE_PAID_TIMEOUT_SECONDS=6
      - OPENCLAW_BRIDGE_PAID_MAX_TOKENS=600
    command: python scripts/openclaw_intel_bridge.py
    depends_on:
      bot-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18080/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ---- Bot 1: Momentum / trend-following ----
  bot-momentum:
    <<: *bot-common
    container_name: bot-momentum
    environment:
      - TZ=UTC
      - BOT_ID=momentum
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 2: Technical indicators ----
  bot-indicators:
    <<: *bot-common
    container_name: bot-indicators
    environment:
      - TZ=UTC
      - BOT_ID=indicators
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 3: Mean reversion ----
  bot-meanrev:
    <<: *bot-common
    container_name: bot-meanrev
    environment:
      - TZ=UTC
      - BOT_ID=meanrev
      - BOT_STYLE=meanrev
      - EXCHANGE=binance
      - TICK_INTERVAL_IDLE=120
      - TICK_INTERVAL_ACTIVE=60
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 4: Swing / grid ----
  bot-swing:
    <<: *bot-common
    container_name: bot-swing
    environment:
      - TZ=UTC
      - BOT_ID=swing
      - BOT_STYLE=swing
      - EXCHANGE=binance
      - TICK_INTERVAL_IDLE=600
      - TICK_INTERVAL_ACTIVE=300
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 5: Extreme mover hunter ----
  bot-extreme:
    <<: *bot-common
    container_name: bot-extreme
    environment:
      - TZ=UTC
      - BOT_ID=extreme
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - DEFAULT_LEVERAGE=20
      - MAX_CONCURRENT_POSITIONS=10
      - TICK_INTERVAL_IDLE=30
      - TICK_INTERVAL_ACTIVE=30
      - EXTREME_ENABLED=true
      - EXTREME_MAX_POSITIONS=10
      - EXTREME_POSITION_SIZE_PCT=10.0
      - EXTREME_MIN_HOURLY_MOVE_PCT=3.0
      - EXTREME_TRAIL_PCT=0.3
      - EXTREME_LOSER_TIMEOUT_MINUTES=2
      - EXTREME_EVAL_INTERVAL=15
      - INITIAL_RISK_AMOUNT=100
      - TAKE_PROFIT_PCT=8
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 6: Scalper (idle by default) ----
  bot-scalper:
    <<: *bot-common
    container_name: bot-scalper
    environment:
      - TZ=UTC
      - BOT_ID=scalper
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - TICK_INTERVAL_ACTIVE=15
      - STOP_LOSS_PCT=0.8
      - TAKE_PROFIT_PCT=2.0
      - INITIAL_RISK_AMOUNT=30
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 7: Full Stack (idle by default) ----
  bot-fullstack:
    <<: *bot-common
    container_name: bot-fullstack
    environment:
      - TZ=UTC
      - BOT_ID=fullstack
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - MAX_CONCURRENT_POSITIONS=10
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 8: Conservative (idle by default) ----
  bot-conservative:
    <<: *bot-common
    container_name: bot-conservative
    environment:
      - TZ=UTC
      - BOT_ID=conservative
      - BOT_STYLE=meanrev
      - EXCHANGE=binance
      - DEFAULT_LEVERAGE=3
      - MAX_POSITION_SIZE_PCT=3
      - STOP_LOSS_PCT=1.0
      - INITIAL_RISK_AMOUNT=20
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 9: Aggressive (idle by default) ----
  bot-aggressive:
    <<: *bot-common
    container_name: bot-aggressive
    environment:
      - TZ=UTC
      - BOT_ID=aggressive
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - DEFAULT_LEVERAGE=20
      - MAX_POSITION_SIZE_PCT=10
      - TAKE_PROFIT_PCT=10
      - INITIAL_RISK_AMOUNT=100
      - MAX_CONCURRENT_POSITIONS=8
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 10: Hedge Heavy (idle by default) ----
  bot-hedger:
    <<: *bot-common
    container_name: bot-hedger
    environment:
      - TZ=UTC
      - BOT_ID=hedger
      - BOT_STYLE=momentum
      - EXCHANGE=binance
      - HEDGE_ENABLED=true
      - HEDGE_RATIO=0.40
      - HEDGE_MIN_PROFIT_PCT=2.0
      - MAX_HEDGES=4
      - HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Log aggregation (Loki + Promtail) ----
  loki:
    build:
      context: ./loki
      dockerfile: Dockerfile.loki
    container_name: tradeborg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    build:
      context: ./loki
      dockerfile: Dockerfile.promtail
    container_name: tradeborg-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    build: ./prometheus
    container_name: trading-bot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      bot-hub:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    build: ./grafana
    container_name: trading-bot-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/trading-bot.json
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
