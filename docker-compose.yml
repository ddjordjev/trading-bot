volumes:
  bot-data:
  bot-logs:
  loki-data:
  grafana-data:
  prometheus-data:

x-bot-common: &bot-common
  build: .
  restart: unless-stopped
  env_file: .env
  environment:
    - TZ=UTC
  command: python bot.py
  volumes:
    - bot-data:/app/data
    - bot-logs:/app/logs
  depends_on:
    monitor:
      condition: service_started
    analytics:
      condition: service_started
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ---- Bot 1: Momentum strategies ----
  bot-momentum:
    <<: *bot-common
    container_name: bot-momentum
    environment:
      - TZ=UTC
      - BOT_ID=momentum
      - BOT_STRATEGIES=compound_momentum,market_open_volatility,rsi,macd
      - DASHBOARD_PORT=9035
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 2: Mean reversion strategies ----
  bot-meanrev:
    <<: *bot-common
    container_name: bot-meanrev
    environment:
      - TZ=UTC
      - BOT_ID=meanrev
      - BOT_STRATEGIES=bollinger,mean_reversion,grid
      - DASHBOARD_PORT=9036
    ports:
      - "9036:9036"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9036/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 3: Swing / opportunity strategies ----
  bot-swing:
    <<: *bot-common
    container_name: bot-swing
    environment:
      - TZ=UTC
      - BOT_ID=swing
      - BOT_STRATEGIES=swing_opportunity
      - DASHBOARD_PORT=9037
    ports:
      - "9037:9037"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9037/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Background DB sync (merges per-bot DBs into unified) ----
  db-sync:
    build: .
    container_name: tradeborg-db-sync
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python scripts/db_sync.py
    volumes:
      - bot-data:/app/data
    depends_on:
      bot-momentum:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ---- Shared services (one instance each) ----
  monitor:
    build: .
    container_name: trading-bot-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_monitor.py
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/intel_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics:
    build: .
    container_name: trading-bot-analytics
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_analytics.py
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/analytics_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Log aggregation (Loki + Promtail) ----
  loki:
    image: grafana/loki:3.4.2
    container_name: tradeborg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    image: grafana/promtail:3.4.2
    container_name: tradeborg-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    build: ./prometheus
    container_name: trading-bot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      bot-momentum:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    build: ./grafana
    container_name: trading-bot-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/trading-bot.json
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
