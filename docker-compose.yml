volumes:
  bot-data:
  bot-logs:

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python bot.py
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    depends_on:
      monitor:
        condition: service_started
      analytics:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/api/status"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  monitor:
    build: .
    container_name: trading-bot-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_monitor.py
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; st=os.stat('data/intel_state.json'); exit(0 if time.time()-st.st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics:
    build: .
    container_name: trading-bot-analytics
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_analytics.py
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; st=os.stat('data/analytics_state.json'); exit(0 if time.time()-st.st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
