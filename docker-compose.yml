volumes:
  loki-data:
  grafana-data:
  prometheus-data:

x-bot-common: &bot-common
  build: .
  restart: unless-stopped
  env_file: .env
  environment:
    - TZ=UTC
  command: python bot.py
  volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_LOGS_DIR}:/app/logs
  depends_on:
    monitor:
      condition: service_started
    analytics:
      condition: service_started
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ---- HUB: Dashboard & coordination only (no trading) ----
  bot-hub:
    <<: *bot-common
    container_name: bot-hub
    environment:
      - TZ=UTC
      - BOT_ID=hub
      - BOT_STYLE=momentum
      - HUB_ONLY=true
      - DASHBOARD_PORT=9035
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_LOGS_DIR}:/app/logs
    - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 1: Momentum / trend-following ----
  bot-momentum:
    <<: *bot-common
    container_name: bot-momentum
    environment:
      - TZ=UTC
      - BOT_ID=momentum
      - BOT_STYLE=momentum
      - BOT_STRATEGIES=compound_momentum,market_open_volatility
      - DASHBOARD_ENABLED=false
      - DASHBOARD_HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 2: Technical indicators ----
  bot-indicators:
    <<: *bot-common
    container_name: bot-indicators
    environment:
      - TZ=UTC
      - BOT_ID=indicators
      - BOT_STYLE=momentum
      - BOT_STRATEGIES=rsi,macd
      - DASHBOARD_ENABLED=false
      - DASHBOARD_HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 3: Mean reversion ----
  bot-meanrev:
    <<: *bot-common
    container_name: bot-meanrev
    environment:
      - TZ=UTC
      - BOT_ID=meanrev
      - BOT_STYLE=meanrev
      - BOT_STRATEGIES=bollinger,mean_reversion
      - DASHBOARD_ENABLED=false
      - DASHBOARD_HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 4: Swing / grid ----
  bot-swing:
    <<: *bot-common
    container_name: bot-swing
    environment:
      - TZ=UTC
      - BOT_ID=swing
      - BOT_STYLE=swing
      - BOT_STRATEGIES=swing_opportunity,grid
      - DASHBOARD_ENABLED=false
      - DASHBOARD_HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Bot 5: Extreme mover hunter ----
  bot-extreme:
    <<: *bot-common
    container_name: bot-extreme
    environment:
      - TZ=UTC
      - BOT_ID=extreme
      - BOT_STYLE=momentum
      - BOT_STRATEGIES=compound_momentum,market_open_volatility
      - DEFAULT_LEVERAGE=20
      - MAX_CONCURRENT_POSITIONS=10
      - EXTREME_ENABLED=true
      - EXTREME_MAX_POSITIONS=10
      - EXTREME_POSITION_SIZE_PCT=10.0
      - EXTREME_MIN_HOURLY_MOVE_PCT=3.0
      - EXTREME_TRAIL_PCT=0.3
      - EXTREME_LOSER_TIMEOUT_MINUTES=2
      - EXTREME_EVAL_INTERVAL=15
      - INITIAL_RISK_AMOUNT=100
      - TAKE_PROFIT_PCT=8
      - DASHBOARD_ENABLED=false
      - DASHBOARD_HUB_URL=http://bot-hub:9035
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

  # ---- Shared services (one instance each) ----
  monitor:
    build: .
    container_name: trading-bot-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_monitor.py
    volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_LOGS_DIR}:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/intel_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics:
    build: .
    container_name: trading-bot-analytics
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_analytics.py
    volumes:
    - ${HOST_DATA_DIR}:/app/data
    - ${HOST_LOGS_DIR}:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/analytics_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Log aggregation (Loki + Promtail) ----
  loki:
    build:
      context: ./loki
      dockerfile: Dockerfile.loki
    container_name: tradeborg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    build:
      context: ./loki
      dockerfile: Dockerfile.promtail
    container_name: tradeborg-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  prometheus:
    build: ./prometheus
    container_name: trading-bot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      bot-hub:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    build: ./grafana
    container_name: trading-bot-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/trading-bot.json
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
