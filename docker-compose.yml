volumes:
  bot-data:
  bot-logs:
  grafana-data:
  prometheus-data:

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python bot.py
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    depends_on:
      monitor:
        condition: service_started
      analytics:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  monitor:
    build: .
    container_name: trading-bot-monitor
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_monitor.py
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/intel_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  analytics:
    build: .
    container_name: trading-bot-analytics
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python run_analytics.py
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; f='data/analytics_state.json'; exit(0) if not os.path.exists(f) else exit(0 if time.time()-os.stat(f).st_mtime<600 else 1)"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: trading-bot-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      trading-bot:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    image: grafana/grafana:latest
    container_name: trading-bot-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/trading-bot.json
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
