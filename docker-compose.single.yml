# Single-container mode: bot runs everything in-process (no separate monitor/analytics).
# Usage:
#   docker compose -f docker-compose.single.yml up -d

volumes:
  bot-data:
  bot-logs:

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=UTC
    command: python bot.py
    ports:
      - "${DASHBOARD_PORT:-9035}:9035"
    volumes:
      - bot-logs:/app/logs
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9035/api/status"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
