version: "3.8"

# Single-container mode: bot runs everything in-process (no separate monitor/analytics).
# Use this if you don't want 3 containers:
#   docker compose -f docker-compose.single.yml up -d

services:
  trading-bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    env_file: .env
    command: python bot.py
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
