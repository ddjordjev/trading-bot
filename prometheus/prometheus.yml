global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "bot-momentum"
    metrics_path: /metrics
    static_configs:
      - targets: ["bot-momentum:9035"]
        labels:
          bot_id: "momentum"

  - job_name: "bot-meanrev"
    metrics_path: /metrics
    static_configs:
      - targets: ["bot-meanrev:9036"]
        labels:
          bot_id: "meanrev"

  - job_name: "bot-swing"
    metrics_path: /metrics
    static_configs:
      - targets: ["bot-swing:9037"]
        labels:
          bot_id: "swing"
