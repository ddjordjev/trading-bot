name: CI

on:
  push:
    branches: [master, develop, refactoring]
  pull_request:
    branches: [master, develop]

jobs:
  example-env-secret-check:
    name: Example Env Secret Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate example env placeholders
        run: python scripts/check_example_env_secrets.py

  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [example-env-secret-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt ruff mypy
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type check (critical modules)
        run: |
          mypy core/risk/ core/orders/scaler.py core/orders/trailing.py \
               db/ analytics/ config/ \
               --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [example-env-secret-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short -m "not integration"
      - name: Coverage surge/coast guard
        run: python scripts/coverage_guard.py --surge-trigger 82 --surge-target 88

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [example-env-secret-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: web/frontend
        run: npm install
      - working-directory: web/frontend
        run: npx tsc --noEmit
      - working-directory: web/frontend
        run: npm run build

  docker-build:
    name: Docker Build (skipped — local only)
    runs-on: ubuntu-latest
    if: false
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-bot:ci .
