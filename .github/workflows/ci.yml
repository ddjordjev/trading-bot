name: CI

on:
  push:
    branches: [master, develop, refactoring]
  pull_request:
    branches: [master, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt ruff mypy
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type check (critical modules)
        run: |
          mypy core/risk/ core/orders/scaler.py core/orders/trailing.py \
               db/ analytics/ config/ \
               --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short -m "not integration"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: web/frontend
        run: npm install
      - working-directory: web/frontend
        run: npx tsc --noEmit
      - working-directory: web/frontend
        run: npm run build

  integration-test:
    name: Binance IT
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run integration tests
        env:
          TRADING_MODE: ${{ secrets.TRADING_MODE }}
          EXCHANGE: ${{ secrets.EXCHANGE }}
          BINANCE_TEST_API_KEY: ${{ secrets.BINANCE_TEST_API_KEY }}
          BINANCE_TEST_API_SECRET: ${{ secrets.BINANCE_TEST_API_SECRET }}
          BYBIT_TEST_API_KEY: ${{ secrets.BYBIT_TEST_API_KEY }}
          BYBIT_TEST_API_SECRET: ${{ secrets.BYBIT_TEST_API_SECRET }}
        run: pytest tests/test_integration_binance.py -v --tb=short -m integration --no-cov

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint-and-type-check, test, integration-test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-bot:ci .
