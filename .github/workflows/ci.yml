name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt ruff mypy
      - name: Ruff lint
        run: ruff check . --output-format=github
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy type check (critical modules)
        run: |
          mypy core/risk/ core/orders/scaler.py core/orders/trailing.py \
               db/ analytics/ config/ \
               --ignore-missing-imports --no-strict

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=80

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: web/frontend
        run: npm install
      - working-directory: web/frontend
        run: npx tsc --noEmit
      - working-directory: web/frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t trading-bot:ci .
